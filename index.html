.wt{font-family:var(--se);font-size:38px;letter-spacing:6px;color:var(--txt);opacity:0;animation:tI 1s ease .8s forwards;position:relative;z-index:1;font-weight:300}.wt em{color:var(--ac);font-style:italic}

.wq{font-family:var(--se);font-size:15px;font-style:italic;color:var(--dim);max-width:300px;text-align:center;line-height:1.6;opacity:0;animation:fU .8s ease 1.6s forwards;position:relative;z-index:1;margin:20px 0 8px}
.wa{font-family:var(--f);font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;opacity:0;animation:fU .6s ease 2s forwards;position:relative;z-index:1}

.ws>div{text-align:center}.wsn{font-family:var(--se);font-size:28px;color:var(--ac2);font-weight:600}.wsl{font-size:9px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.we{margin-top:28px;padding:14px 40px;border:1px solid var(--ac);background:transparent;color:var(--ac);font-family:var(--f);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:100px;cursor:pointer;opacity:0;animation:fU .6s ease 2.6s forwards;position:relative;z-index:1;transition:all .3s}
.we:active{transform:scale(.95);background:var(--acd)}

.ib{width:36px;height:36px;border-radius:50%;background:var(--s1);border:1px solid var(--bdr);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;font-size:14px}

.dlb{margin:0 16px 10px;padding:10px 14px;border-radius:var(--rs);background:linear-gradient(135deg,var(--acd),rgba(155,125,232,.06));border:1px solid rgba(180,156,239,.15);display:none;align-items:center;gap:10px}.dlb.show{display:flex}
.dlbt{font-size:11px;font-weight:600;color:var(--ac2);line-height:1.4}.dlbt span{display:block;font-weight:400;color:var(--dim);font-size:10px}

.eh{padding:12px 14px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.en{font-weight:600;font-size:13px;line-height:1.3}.et{font-size:10px;font-weight:700;color:var(--ac);background:var(--acd);padding:3px 9px;border-radius:7px;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}

.sr{padding:8px 14px 12px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}.sr::-webkit-scrollbar{display:none}

.si{width:100%;background:var(--s2);border:1.5px solid transparent;border-radius:var(--rs);color:var(--txt);font-family:var(--f);font-size:14px;font-weight:600;text-align:center;padding:8px 2px;outline:none;transition:all .25s;font-variant-numeric:tabular-nums}

.si::placeholder{color:var(--mut);font-weight:400;font-size:9px}.si.ri{font-size:11px;padding:5px 2px;color:var(--dim);background:var(--s3)}.si.ri:focus{color:var(--txt)}

.prb{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--gld),#d4a843);color:var(--bg);font-size:8px;font-weight:800;letter-spacing:.8px;padding:3px 8px;border-radius:100px;display:none;animation:pI .4s cubic-bezier(.2,.8,.2,1)}.prb.show{display:block}

.cath{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0;border-radius:var(--r)}.cath.fire{animation:cF 2.5s ease forwards}
@keyframes cF{0%{opacity:0}15%{opacity:1}70%{opacity:.6}100%{opacity:0}}
.cath .ray{position:absolute;top:-40%;width:30px;height:180%;background:linear-gradient(to bottom,transparent,rgba(232,196,90,.15),rgba(180,156,239,.1),transparent);transform:rotate(15deg);animation:rM 2s ease-out forwards}
.cath .ray:nth-child(1){left:10%}.cath .ray:nth-child(2){left:30%;animation-delay:.15s;width:20px}.cath .ray:nth-child(3){left:55%;animation-delay:.25s}.cath .ray:nth-child(4){left:75%;animation-delay:.1s;width:25px}.cath .ray:nth-child(5){left:90%;animation-delay:.3s;width:15px}

.tw.mini{bottom:94px}.tw.mini .tp{padding:6px 10px;gap:6px}.tw.mini .tr{width:24px;height:24px}.tw.mini .tn{font-size:12px;min-width:24px}.tw.mini .tx{display:none}

.chw{padding:12px 0}.chw svg{width:100%;height:80px}.chl{fill:none;stroke:var(--ac);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.chd{fill:var(--ac)}.chla{font-size:9px;fill:var(--mut);font-family:var(--f)}

.clb{display:flex;gap:10px;justify-content:center}.clb button{padding:11px 26px;border-radius:var(--rs);font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:var(--s2);color:var(--txt);letter-spacing:.5px}.clb button:active{transform:scale(.95)}.clb .dg{background:var(--redd);color:var(--red);border-color:rgba(240,112,112,.3)}

let cur=0,dlM=false,timerInt=null,timerTot=90,timerLeft=90,timerMini=false;
const K='stations_v3',DK='stations_draft';
const ld=()=>{try{return JSON.parse(localStorage.getItem(K))||{}}catch{return{}}};
const sv=d=>localStorage.setItem(K,JSON.stringify(d));
const ldDraft=()=>{try{return JSON.parse(localStorage.getItem(DK))||{}}catch{return{}}};
const svDraft=d=>localStorage.setItem(DK,JSON.stringify(d));

function totSes(){const d=ld();let t=0;for(const k in d)t+=(d[k]||[]).length;return t}
function streak(){const d=ld();let s=0;const td=new Date();td.setHours(0,0,0,0);for(let i=0;i<60;i++){const c=new Date(td);c.setDate(c.getDate()-i);const ds=c.toISOString().slice(0,10);let f=false;for(const k in d)(d[k]||[]).forEach(x=>{if(x.date&&x.date.slice(0,10)===ds)f=true});if(f)s++;else if(i>0)break}return s}
function getLast(did,nm){const h=(ld()[did]||[]);for(let i=h.length-1;i>=0;i--){const e=h[i].exercises?.find(x=>x.name===nm);if(e&&e.sets.some(s=>s.w))return e}return null}
function getBest(did,nm){const h=(ld()[did]||[]);let b=0;h.forEach(s=>{const e=s.exercises?.find(x=>x.name===nm);if(e)e.sets.forEach(s=>{const w=parseFloat(s.w);if(w>b)b=w})});return b}
function getHist(did,nm){const h=(ld()[did]||[]),o=[];h.forEach(s=>{const e=s.exercises?.find(x=>x.name===nm);if(e){const m=Math.max(...e.sets.map(s=>parseFloat(s.w)||0));if(m>0)o.push({date:s.date,w:m})}});return o}
function dlS(n){return n>=5?3:n>=3?n-1:n}

// WELCOME
function initW(){const q=Q[Math.floor(Math.random()*Q.length)];document.getElementById('wQ').textContent=`"${q[0]}"`;document.getElementById('wA').textContent=`— ${q[1]}`;document.getElementById('wT').textContent=totSes();document.getElementById('wS').textContent=streak()}
document.getElementById('wE').addEventListener('click',()=>{document.getElementById('W').classList.add('exit');setTimeout(()=>{document.getElementById('W').style.display='none';document.getElementById('A').classList.add('show')},800)});

// RENDER
function rTabs(){const el=document.getElementById('tabs');el.innerHTML=D.map((d,i)=>`<div class="tab ${i===cur?'on':''}" data-i="${i}">${d.tab}</div>`).join('');el.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{cur=+t.dataset.i;rTabs();rDay()}));const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'})}

function rDay(){
const day=D[cur];document.getElementById('dT').textContent=day.sub;document.getElementById('dC').textContent=day.cls;
document.getElementById('dL').classList.toggle('show',dlM);document.getElementById('sN').textContent=streak();
const draft=ldDraft();const dayDraft=draft[day.id]||{};
let h='<div class="sl">Exercises</div>';
day.ex.forEach((ex,ei)=>{
const last=getLast(day.id,ex.n),best=getBest(day.id,ex.n),sc=dlM?dlS(ex.s):ex.s;
h+=`<div class="ec" style="animation-delay:${ei*.03}s" id="ec-${ei}"><div class="cath" id="ca-${ei}"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="prb" id="pr-${ei}">NEW PR ✝</div><div class="eh"><div class="en" onclick="showCh('${day.id}','${ex.n.replace(/'/g,"\\'")}')">${ex.n}</div><div class="et ${dlM?'dl':''}">${sc}×${ex.r}</div></div><div class="sr">`;
for(let si=0;si<sc;si++){
const lw=last?.sets?.[si]?.w||'',lr=last?.sets?.[si]?.r||'';
const dw=dayDraft[`${ei}-${si}-w`]||'',dr=dayDraft[`${ei}-${si}-r`]||'';
h+=`<div class="sc"><div class="scl">S${si+1}</div><div class="ip"><input class="si" type="number" inputmode="decimal" step="any" placeholder="${dlM?'50%':'kg'}" data-e="${ei}" data-s="${si}" data-f="w" data-c="${ex.c}" value="${dw}" oninput="onIn(this,${ei},'${day.id}','${ex.n.replace(/'/g,"\\'")}')"><input class="si ri" type="number" inputmode="numeric" placeholder="reps" data-e="${ei}" data-s="${si}" data-f="r" value="${dr}" oninput="saveDraft()"></div><div class="lv">${lw?lw+'×'+lr:''}</div></div>`;
}
h+=`</div></div>`;
});
// Abs
h+='<div class="sl">Abs Finisher</div><div class="co" id="absC"><div class="coh" onclick="tg(\'absC\')"><div class="cot">🔥 Abs Circuit</div><div class="coc">▾</div></div><div class="cob"><div class="coi">';
day.abs.forEach((a,i)=>h+=`<div class="cr" id="a-${i}" onclick="tc('a-${i}')"><div class="ck">✓</div><div class="ct">${a}</div></div>`);
h+='</div></div></div>';
// Skill
h+='<div class="sl">Skill Work</div><div class="co" id="skC"><div class="coh" onclick="tg(\'skC\')"><div class="cot">🎯 '+((day.id==='mon'||day.id==='wed'||day.id==='fri')?'Coach Milos Class':'Today\'s Drills')+'</div><div class="coc">▾</div></div><div class="cob"><div class="coi">';
day.skill.forEach((s,i)=>h+=`<div class="cr" id="s-${i}" onclick="tc('s-${i}')"><div class="ck">✓</div><div class="ct">${s}</div></div>`);
h+='</div></div></div>';
// Flexibility
h+='<div class="sl">Flexibility — Splits Protocol</div><div class="co" id="flC"><div class="coh" onclick="tg(\'flC\')"><div class="cot">🧘 Stretching (15-20 min)</div><div class="coc">▾</div></div><div class="cob"><div class="coi">';
day.flex.forEach((f,i)=>h+=`<div class="cr" id="f-${i}" onclick="tc('f-${i}')"><div class="ck">✓</div><div class="ct">${f}</div></div>`);
h+='</div></div></div>';
// Skincare
h+='<div class="sl">Skincare — '+day.skin.pm+'</div><div class="co" id="snC"><div class="coh" onclick="tg(\'snC\')"><div class="cot">🧴 PM Face + Body</div><div class="coc">▾</div></div><div class="cob"><div class="coi">';
h+='<div class="seclbl" style="color:var(--ac)">FACE</div>';
day.skin.face.forEach((s,i)=>h+=`<div class="cr" id="sf-${i}" onclick="tc('sf-${i}')"><div class="ck">✓</div><div class="ct">${s}</div></div>`);
h+='<div class="seclbl" style="color:var(--ac);margin-top:10px">BODY</div>';
day.skin.body.forEach((s,i)=>h+=`<div class="cr" id="sb-${i}" onclick="tc('sb-${i}')"><div class="ck">✓</div><div class="ct">${s}</div></div>`);
h+='</div></div></div>';
document.getElementById('wc').innerHTML=h;
const btn=document.getElementById('svB');btn.textContent='COMPLETE STATION';btn.classList.remove('ok');
}

function tg(id){document.getElementById(id).classList.toggle('open')}
function tc(id){const el=document.getElementById(id);el.classList.toggle('done');el.querySelector('.ck').classList.toggle('done')}

// AUTO-SAVE DRAFT
function saveDraft(){
const day=D[cur],draft=ldDraft();if(!draft[day.id])draft[day.id]={};
const sc=dlM?dlS:x=>x;
day.ex.forEach((ex,ei)=>{
const sets=dlM?dlS(ex.s):ex.s;
for(let si=0;si<sets;si++){
const w=document.querySelector(`[data-e="${ei}"][data-s="${si}"][data-f="w"]`)?.value||'';
const r=document.querySelector(`[data-e="${ei}"][data-s="${si}"][data-f="r"]`)?.value||'';
draft[day.id][`${ei}-${si}-w`]=w;draft[day.id][`${ei}-${si}-r`]=r;
}});
svDraft(draft);
}

// ON INPUT — auto-save + timer + PR check
function onIn(inp,ei,did,nm){
saveDraft();
const isC=inp.dataset.c==='1';startTimer(isC);
const val=parseFloat(inp.value),best=getBest(did,nm);
if(val>best&&best>0){
const ca=document.getElementById('ca-'+ei),pr=document.getElementById('pr-'+ei);
ca.classList.remove('fire');void ca.offsetWidth;ca.classList.add('fire');pr.classList.add('show');
}}

// TIMER
function startTimer(compound){
timerTot=compound?120:90;timerLeft=timerTot;timerMini=false;
clearInterval(timerInt);
const tw=document.getElementById('tW');tw.classList.add('show');tw.classList.remove('mini');
updTimer();
timerInt=setInterval(()=>{timerLeft--;updTimer();if(timerLeft<=0){clearInterval(timerInt);tw.classList.remove('show')}},1000);
}
function updTimer(){document.getElementById('tN').textContent=timerLeft;const off=94.2*(1-timerLeft/timerTot);document.getElementById('tA').style.strokeDashoffset=off}
// Minimize instead of close
document.getElementById('tX').addEventListener('click',e=>{e.stopPropagation();const tw=document.getElementById('tW');if(!timerMini){timerMini=true;tw.classList.add('mini')}else{clearInterval(timerInt);tw.classList.remove('show','mini');timerMini=false}});
// Tap pill to expand from mini
document.getElementById('tP').addEventListener('click',()=>{if(timerMini){timerMini=false;document.getElementById('tW').classList.remove('mini')}});

// CHART
function showCh(did,nm){
const hist=getHist(did,nm);let h='<div class="mb"></div>';h+=`<h2>${nm}</h2>`;
if(hist.length<2)h+='<div class="nh">Need 2+ sessions for a chart.<em>Keep training.</em></div>';
else{const ws=hist.map(x=>x.w),mn=Math.min(...ws)*.9,mx=Math.max(...ws)*1.05,w=320,ht=80,p=5;
const pts=hist.map((x,i)=>({x:p+i*(w-p*2)/(hist.length-1),y:ht-p-(x.w-mn)/(mx-mn)*(ht-p*2),w:x.w}));
const ln=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
h+=`<div class="chw"><svg viewBox="0 0 ${w} ${ht}"><path class="chl" d="${ln}"/>`;
pts.forEach(p=>h+=`<circle class="chd" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3"/>`);
h+=`<text class="chla" x="${pts[0].x}" y="${ht-1}">${ws[0]}kg</text><text class="chla" x="${pts[pts.length-1].x}" y="${ht-1}" text-anchor="end">${ws[ws.length-1]}kg</text>`;
h+='</svg></div>';if(ws[ws.length-1]>ws[0])h+=`<div style="font-size:11px;color:var(--grn);text-align:center;margin-bottom:12px">↑ ${(ws[ws.length-1]-ws[0]).toFixed(1)}kg progress</div>`}
const ses=(ld()[did]||[]).slice().reverse();ses.forEach(s=>{const e=s.exercises?.find(x=>x.name===nm);if(!e)return;const d=new Date(s.date);h+=`<div class="he"><div class="hed">${d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div><div class="hes">${e.sets.filter(s=>s.w).map(s=>s.w+'kg×'+(s.r||'?')).join('  ·  ')}</div></div>`});
document.getElementById('mC').innerHTML=h;document.getElementById('mo').classList.add('open');
}

// SAVE SESSION
document.getElementById('svB').addEventListener('click',()=>{
const day=D[cur],d=ld();if(!d[day.id])d[day.id]=[];
const ses={date:new Date().toISOString(),exercises:[],deload:dlM};
day.ex.forEach((ex,ei)=>{const sc=dlM?dlS(ex.s):ex.s,sets=[];
for(let si=0;si<sc;si++){const w=document.querySelector(`[data-e="${ei}"][data-s="${si}"][data-f="w"]`)?.value||'';const r=document.querySelector(`[data-e="${ei}"][data-s="${si}"][data-f="r"]`)?.value||'';sets.push({w,r})}
if(sets.some(s=>s.w||s.r))ses.exercises.push({name:ex.n,sets})});
if(!ses.exercises.length)return;
d[day.id].push(ses);if(d[day.id].length>30)d[day.id]=d[day.id].slice(-30);sv(d);
// Clear draft for this day
const draft=ldDraft();delete draft[day.id];svDraft(draft);
const btn=document.getElementById('svB');btn.textContent='✓ STATION COMPLETE';btn.classList.add('ok');
document.getElementById('sN').textContent=streak();
setTimeout(()=>{btn.textContent='COMPLETE STATION';btn.classList.remove('ok')},2500);
});

// HISTORY
document.getElementById('hB').addEventListener('click',()=>{
const day=D[cur],ses=(ld()[day.id]||[]).slice().reverse();
let h='<div class="mb"></div>';h+=`<h2>${day.label} History</h2>`;
if(!ses.length)h+='<div class="nh">No stations completed yet.<em>"The journey begins with a single step."</em></div>';
else ses.forEach(s=>{const d=new Date(s.date);h+=`<div class="he"><div class="hed">${s.deload?'⚡ DELOAD — ':''}${d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div>`;s.exercises.forEach(e=>{h+=`<div class="hen">${e.name}</div><div class="hes">${e.sets.filter(s=>s.w).map(s=>s.w+'kg×'+(s.r||'?')).join('  ·  ')}</div>`});h+=`</div>`});
document.getElementById('mC').innerHTML=h;document.getElementById('mo').classList.add('open');
});

// DELOAD / CLEAR / MODAL
document.getElementById('dB').addEventListener('click',()=>{dlM=!dlM;document.getElementById('dB').classList.toggle('on',dlM);rDay()});
document.getElementById('cB').addEventListener('click',()=>{let h='<div class="mb"></div><div class="clc"><h2>Clear All Data?</h2><p>Permanently deletes all workout history and drafts.</p><div class="clb"><button onclick="document.getElementById(\'mo\').classList.remove(\'open\')">Cancel</button><button class="dg" onclick="localStorage.removeItem(\''+K+'\');localStorage.removeItem(\''+DK+'\');document.getElementById(\'mo\').classList.remove(\'open\');rDay()">Delete</button></div></div>';document.getElementById('mC').innerHTML=h;document.getElementById('mo').classList.add('open')});
document.getElementById('mo').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')});

// INIT
const dm={1:0,2:1,3:2,4:3,5:4,6:5,0:0};cur=dm[new Date().getDay()];
initW();rTabs();rDay();
</script>
